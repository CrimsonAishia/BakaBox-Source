syntax = "proto3";

package lobby;

option go_package = "./proto";

// ==================== 通用 Envelope ====================

// LobbyEnvelope 所有大厅消息的外层包装
message LobbyEnvelope {
  int32 v = 1;                    // 协议版本
  string type = 2;                // 消息类型
  int64 ts = 3;                   // 服务端时间戳（毫秒）
  string trace_id = 4;            // 请求追踪 ID
  
  oneof payload {
    // 客户端 -> 服务端
    LoginRequest login_request = 10;
    LogoutRequest logout_request = 11;
    MoveRequest move_request = 12;
    ChatSendRequest chat_send_request = 13;
    ProfileAnonymousChangeRequest profile_anonymous_change_request = 14;
    ProfileSpriteChangeRequest profile_sprite_change_request = 15;
    ProfileStatusTextUpdateRequest profile_status_text_update_request = 16;
    ProfileDisplayNameUpdateRequest profile_display_name_update_request = 17;
    SnapshotRequest snapshot_request = 18;
    AssetsRequest assets_request = 19;
    BroadcastSendRequest broadcast_send_request = 20;
    BroadcastCDRequest broadcast_cd_request = 21;
    PortalUseRequest portal_use_request = 22;
    OnlineStatsRequest online_stats_request = 23;
    ProfileSteamBindRequest profile_steam_bind_request = 24;
    EnterRequest enter_request = 25;

    // 服务端 -> 客户端
    LoginSuccessResponse login_success_response = 50;
    LoginFailedResponse login_failed_response = 51;
    LogoutSuccessResponse logout_success_response = 52;
    JoinSuccessResponse join_success_response = 53;
    SnapshotResponse snapshot_response = 54;
    PresenceJoinResponse presence_join_response = 55;
    PresenceLeaveResponse presence_leave_response = 56;
    IdentityChangedResponse identity_changed_response = 57;
    MoveBroadcastResponse move_broadcast_response = 58;
    MoveRejectResponse move_reject_response = 59;
    ChatMessageResponse chat_message_response = 60;
    ChatRejectResponse chat_reject_response = 61;
    AnonymousChangedResponse anonymous_changed_response = 62;
    SpriteChangedResponse sprite_changed_response = 63;
    SpriteChangeRejectResponse sprite_change_reject_response = 64;
    StatusTextBroadcastResponse status_text_broadcast_response = 65;
    DisplayNameChangedResponse display_name_changed_response = 66;
    AssetsResponse assets_response = 67;
    AssetsUpdatedResponse assets_updated_response = 68;
    PortalTeleportResponse portal_teleport_response = 69;
    PortalUseRejectResponse portal_use_reject_response = 70;
    BroadcastMessageResponse broadcast_message_response = 71;
    BroadcastRejectResponse broadcast_reject_response = 72;
    BroadcastCDResponse broadcast_cd_response = 73;
    OnlineStatsResponse online_stats_response = 74;
    SystemErrorResponse system_error_response = 75;
    SystemNoticeResponse system_notice_response = 76;
    SystemKickedResponse system_kicked_response = 77;
    SteamBindSuccessResponse steam_bind_success_response = 78;
    SpriteChangeSuccessResponse sprite_change_success_response = 79;
    PresenceDeltaResponse presence_delta_response = 80;
  }
}

// ==================== 数据模型 ====================

// LobbyUser 用户信息
message LobbyUser {
  string user_id = 1;
  string nickname = 2;
  string steam_name = 3;
  string sprite_id = 4;
  string avatar_url = 5;
  double x = 6;
  double y = 7;
  string facing = 8;
  bool is_online = 9;
  bool is_anonymous = 10;
  string status_text = 11;
  string last_message = 12;
  string steam_id = 13;  // Steam 唯一 ID（仅自身可见，不广播给其他用户）
  string business_user_id = 14;  // 业务 ID（所有人可见）
  string map_id = 15;  // 用户当前所在地图 ID
}

// LobbyMessage 聊天消息
message LobbyMessage {
  string message_id = 1;
  string user_id = 2;
  string nickname = 3;
  string content = 4;
  string type = 5;
  bool is_anonymous = 6;
  int64 timestamp = 7;
}

// LobbyBroadcastMessage 全服广播消息
message LobbyBroadcastMessage {
  string message_id = 1;
  string user_id = 2;
  string nickname = 3;
  string content = 4;
  int64 timestamp = 5;
  string avatar_url = 6;
}

// LobbyMapConfig 地图配置
message LobbyMapConfig {
  string map_id = 1;
  string label = 2;
  string background_url = 3;
  double width = 4;
  double height = 5;
  repeated LobbyWalkableArea walkable_areas = 6;
  repeated LobbyPortal portals = 7;
  bool is_default = 8;
}

// LobbyWalkableArea 可行走区域
message LobbyWalkableArea {
  double left = 1;
  double top = 2;
  double right = 3;
  double bottom = 4;
}

// LobbyPortal 传送门
message LobbyPortal {
  string key = 1;
  string label = 2;
  double x = 3;
  double y = 4;
  string target_map_id = 5;
  double target_x = 6;
  double target_y = 7;
}

// LobbySpriteConfig 角色外观配置
message LobbySpriteConfig {
  string id = 1;
  string label = 2;
  string accent_color = 3;
  string sprite_url = 4;
  string preview_url = 5;
  bool is_default = 6;
}

// PageInfo 分页信息
message PageInfo {
  int32 current_page = 1;
  int32 total_pages = 2;
  int32 page_size = 3;
  int32 total_users = 4;
}

// ==================== 客户端 -> 服务端 请求 ====================

message LoginRequest {
  string token = 1;
  string device_type = 2;
  bool is_anonymous = 3;  // 是否以匿名模式登录（true = 登录但对外隐藏真实身份）
}

// EnterRequest 客户端完成身份确认后，主动宣告进入大厅（两阶段进入协议第二阶段）
// 客户端流程：joinMatch() → [可选 login] → enter → 服务端广播 presence.join
message EnterRequest {
  // 无额外参数，服务端从 stagingMap 取当前身份
  int32 protocol_features = 1;  // 位掩码：bit0=支持 presence.delta，bit1=支持排队
}

message LogoutRequest {
  bool force = 1;
}

message MoveRequest {
  double target_x = 1;
  double target_y = 2;
}

message ChatSendRequest {
  string content = 1;
}

message ProfileAnonymousChangeRequest {
  bool is_anonymous = 1;
}

message ProfileSpriteChangeRequest {
  string sprite_id = 1;
}

message ProfileStatusTextUpdateRequest {
  string status_text = 1;
}

message ProfileDisplayNameUpdateRequest {
  string custom_name = 1;
  string steam_name = 2;
}

message ProfileSteamBindRequest {
  string steam_id = 1;   // Steam 唯一 ID（64位数字字符串，如 "76561198xxxxxxxxx"）
  string steam_name = 2; // Steam 昵称（可选，同步更新显示名）
}

message SnapshotRequest {
  // last_delta_seq：客户端重连时携带上次收到的 presence.delta 序列号（S3 增量恢复）。
  // 0 或不携带 = 请求全量快照（旧客户端默认行为）。
  // 服务端若支持且能覆盖该 seq，则只回增量（is_resume=true），否则回全量。
  int64 last_delta_seq = 1;
}

message AssetsRequest {
  // 无参数
}

message BroadcastSendRequest {
  string content = 1;
}

message BroadcastCDRequest {
  // 无参数
}

message PortalUseRequest {
  string portal_key = 1;
}

message OnlineStatsRequest {
  bool include_users = 1;
}

// ==================== 服务端 -> 客户端 响应 ====================

message LoginSuccessResponse {
  string user_id = 1;
  string nickname = 2;
}

message LoginFailedResponse {
  int32 code = 1;
  string reason = 2;
}

message LogoutSuccessResponse {
  bool kick = 1;
}

message JoinSuccessResponse {
  string map_id = 1;
  LobbyUser user = 2;
  int32 online_count = 3;
}

message SnapshotResponse {
  LobbyMapConfig map_config = 1;
  LobbyUser self = 2;
  repeated LobbyUser users = 3;
  repeated LobbyMessage recent_messages = 4;
  PageInfo page_info = 5;

  // ==================== S3 重连增量恢复 ====================
  // is_resume=true 时本响应是增量快照：users 字段仅含「自上次 last_delta_seq 以来
  // 新增的用户」，left_user_ids 含「离开的用户」，客户端应在本地列表基础上做增量合并，
  // 而非整表替换。is_resume=false（默认）时为全量快照，客户端整表替换（旧行为）。
  bool is_resume = 6;
  repeated string left_user_ids = 7; // 仅 is_resume=true 时有效：增量期间离开的用户
  int64 delta_seq = 8;               // 本次快照对应的最新 delta 序列号，客户端据此续接
}

message PresenceJoinResponse {
  LobbyUser user = 1;
  string source_map_id = 2;  // 非空表示用户是从该地图传送过来的（空 = 正常加入）
  bool is_cross_map_notification = 3;  // true = 跨地图通知（用户在其他地图，不渲染），false = 本地图用户（渲染）
}

message PresenceLeaveResponse {
  string user_id = 1;
  string target_map_id = 2;
}

message IdentityChangedResponse {
  string session_key = 1;
  string old_user_id = 2;
  string new_user_id = 3;
  string nickname = 4;
  string avatar_url = 5;
  string sprite_id = 6;
  bool is_anonymous = 7;
  string business_user_id = 8;  // 新业务 ID（logout 时为空）
}

message MoveBroadcastResponse {
  string user_id = 1;
  double target_x = 2;
  double target_y = 3;
  string facing = 4;
}

message MoveRejectResponse {
  string reason = 1;
  double correction_x = 2;
  double correction_y = 3;
}

message ChatMessageResponse {
  LobbyMessage message = 1;
}

message ChatRejectResponse {
  string reason = 1;
}

message AnonymousChangedResponse {
  string user_id = 1;
  bool is_anonymous = 2;
  string display_nickname = 3;
}

message SpriteChangedResponse {
  string user_id = 1;
  string sprite_id = 2;
}

message SpriteChangeSuccessResponse {
  string sprite_id = 1;
}

message SpriteChangeRejectResponse {
  string reason = 1;
}

message StatusTextBroadcastResponse {
  string user_id = 1;
  string status_text = 2;
}

message DisplayNameChangedResponse {
  string user_id = 1;
  string nickname = 2;
}

message AssetsResponse {
  repeated LobbyMapConfig maps = 1;
  repeated LobbySpriteConfig sprites = 2;
}

message AssetsUpdatedResponse {
  string update_type = 1;
  string message = 2;
}

message PortalTeleportResponse {
  string portal_key = 1;
  string label = 2;
  string source_map_id = 3;
  string target_map_id = 4;
  double target_x = 5;
  double target_y = 6;
  string target_match_id = 7;  // 目标地图的 Match ID，客户端直接用此 ID joinMatch，无需再调 lobby_join RPC
}

message PortalUseRejectResponse {
  string reason = 1;
}

message BroadcastMessageResponse {
  LobbyBroadcastMessage message = 1;
}

message BroadcastRejectResponse {
  string reason = 1;
}

message BroadcastCDResponse {
  bool in_cooldown = 1;
  int64 remaining_ms = 2;
  int64 next_broadcast_at = 3;
}

message OnlineStatsResponse {
  int32 total = 1;
  map<string, int32> by_map = 2;
  repeated LobbyUser users = 3;
}

message SystemErrorResponse {
  int32 code = 1;
  string message = 2;
}

message SystemNoticeResponse {
  string message = 1;
}

message SystemKickedResponse {
  string reason = 1;
  string message = 2;
}

message SteamBindSuccessResponse {
  string steam_id = 1;
  string steam_name = 2;
  string display_nickname = 3; // 绑定后的最终显示昵称
}

// ==================== RPC 请求/响应 ====================

// LobbyJoinRequest 加入大厅请求
message LobbyJoinRequest {
  string device_type = 1;       // "mobile" 或 "pc"，默认 "pc"
  int32 protocol_features = 2;  // 位掩码：bit0=支持 presence.delta，bit1=支持排队
  string token = 3;             // 已登录用户的 JWT（可选）。服务端据此按账号恢复地图/坐标/模型，
                                // 解决设备 ID 变更（如换机、设备ID升级）后大厅偏好丢失问题。匿名/未登录留空。
}

// LobbyJoinResponse 加入大厅响应
message LobbyJoinResponse {
  string match_id = 1;          // 非空 = 立即可进入；空 = 进入排队
  string map_id = 2;            // 分配的地图 ID

  // 排队相关（match_id 为空时有效）
  string ticket = 3;            // 排队令牌，后续查询用
  int32 position = 4;           // 当前队列位置（1-based）
  int32 queue_total = 5;        // 队列总长度
  int32 eta_seconds = 6;        // 预计等待时间（秒）
  int32 poll_interval_ms = 7;   // 建议的轮询间隔（毫秒）
}

// SteamUserInfoRequest 查询 Steam 用户信息请求
message SteamUserInfoRequest {
  string user_id = 1;  // 目标用户的 Nakama UUID，服务端自动查询其绑定的 Steam64 ID
}

// SteamUserInfoResponse 查询 Steam 用户信息响应
message SteamUserInfoResponse {
  int32  code    = 1;  // 0=成功，非0=失败
  string message = 2;  // 错误描述

  // 以下字段仅 code=0 时有效
  int64  forum_uid          = 3;
  string forum_username     = 4;
  string forum_avatar_url   = 5;
  string steam_id           = 6;   // STEAM_x:x:xxxxxxx 格式
  string steam_id64         = 7;   // 64位数字字符串
  string avatar_url         = 8;
  string steam_name         = 9;
  string in_game_name       = 10;
  string join_date          = 11;
  int32  vip_level          = 12;
  string vip_date           = 13;
  string vip_end            = 14;  // 空字符串表示 null
  int64  csgo_gold          = 15;
  int64  online_time_total  = 16;
  int64  online_time_day    = 17;
  int64  cs2_gold           = 18;
  int64  cs2_point          = 19;
  int64  cs2_spent_point    = 20;

  // 各模式当前积分（null 时为 0）
  int64  mg_pts             = 21;
  int64  mg_pts_rank        = 22;
  int64  mg_pts_total       = 23;
  int64  surf_pts           = 24;
  int64  surf_pts_rank      = 25;
  int64  surf_pts_total     = 26;
  int64  bhop_pts           = 27;
  int64  bhop_pts_rank      = 28;
  int64  bhop_pts_total     = 29;
  int64  kz_pts             = 30;
  int64  kz_pts_rank        = 31;
  int64  kz_pts_total       = 32;

  // CSGO 数据
  int64  csgo_online_time        = 33;
  int64  csgo_zombie_pts         = 34;
  int64  csgo_zombie_kill        = 35;
  int64  csgo_zombie_knife       = 36;
  int64  csgo_zombie_kick_ass    = 37;
  int64  csgo_zombie_lost_ass    = 38;
  int64  csgo_zombie_pro_level   = 39;
  int64  csgo_mg_pts             = 40;
  int64  csgo_surf_pts           = 41;
  int64  csgo_bhop_pts           = 42;
  int64  csgo_kz_pts             = 43;
  int64  csgo_ttt_innocent_pts   = 44;
  int64  csgo_ttt_detective_pts  = 45;
  int64  csgo_ttt_traitor_pts    = 46;

  // CSS 数据
  int64  css_zombie_pts          = 47;
  int64  css_zombie_kill         = 48;
  int64  css_zombie_knife        = 49;
  int64  css_zombie_kick_ass     = 50;
  int64  css_zombie_pro_level    = 51;
  int64  css_titan_pts           = 52;
  int64  css_titan_kills         = 53;
  int64  css_titan_special_kills = 54;
  int64  css_titan_human_kills   = 55;
  int64  css_titan_assists       = 56;
  int64  css_ttt_pts             = 57;
  int64  css_ttt_wrong_kill      = 58;
  int64  css_ttt_karma           = 59;

  // 新捐助者字段（API 更新后 vip_* 字段已被 donator_* 替代）
  // 旧字段 vip_level/vip_date/vip_end 保持兼容（自动从 donator 字段回填）
  int32  donator_level           = 60;
  string donate_date             = 61;
  string donate_end              = 62;  // 空字符串表示 null（永久）
  bool   donator_sign_today      = 63;
  string current_date            = 64;
}

// InventoryStatsRequest 查询玩家库存统计请求
message InventoryStatsRequest {
  string user_id = 1;  // 目标用户的 Nakama UUID，服务端自动查询其绑定的 Steam64 ID
}

// InventoryStatsResponse 查询玩家库存统计响应
message InventoryStatsResponse {
  int32  code    = 1;  // 0=成功，非0=失败
  string message = 2;  // 错误描述

  // 以下字段仅 code=0 时有效
  int32 skin_count        = 3;  // 皮肤数量
  int32 spell_count       = 4;  // 法术数量
  int32 danmaku_count     = 5;  // 弹幕数量
  int32 skill_count       = 6;  // 技能数量
  int32 knife_count       = 7;  // 刀具数量
  int32 weapon_count      = 8;  // 武器数量
  int32 cheer_count       = 9;  // 喝彩数量
  int32 skinmenu_count    = 10; // 皮肤菜单数量
  int64 total_gold_value  = 11; // 总金币价值
  int64 total_point_value = 12; // 总积分价值
}

// PresenceDeltaResponse 增量 presence 帧（替代逐条 presence.join/leave）
// 服务端每 tick 末尾合并本 tick 内所有 enter/leave 变化，一次性推送。
// 客户端收到后批量更新本地用户列表，减少渲染抖动。
// seq 为单调递增序列号，客户端检测到 seq 不连续时应主动请求 snapshot 进行全量同步。
message PresenceDeltaResponse {
  repeated LobbyUser joined = 1;          // 本帧内新进入的用户
  repeated string left_user_ids = 2;      // 本帧内离开的用户 ID
  repeated CrossMapPresenceEvent cross_map_events = 3; // 跨地图通知（弱通知）
  int64 seq = 10;                         // 递增序列号，客户端检测不连续时请求 snapshot
}

// CrossMapPresenceEvent 跨地图 presence 事件（弱通知，不渲染角色，仅 UI 提示）
message CrossMapPresenceEvent {
  string user_id = 1;
  string nickname = 2;
  string avatar_url = 3;
  bool is_anonymous = 4;
  string map_id = 5;           // 事件发生的地图
  string event_type = 6;       // "join" 或 "leave"
  string target_map_id = 7;    // leave 时的目标地图（传送场景）
}

// ==================== 惊群效应改造：排队系统 ====================

// QueueStatusRequest 查询排队状态
message QueueStatusRequest {
  string ticket = 1;
}

// QueueStatusResponse 排队状态响应
message QueueStatusResponse {
  bool ready = 1;              // true = 可进入，使用 match_id 调 joinMatch
  string match_id = 2;         // ready=true 时有效
  string map_id = 3;

  int32 position = 4;          // 当前位置
  int32 queue_total = 5;
  int32 eta_seconds = 6;
  int32 poll_interval_ms = 7;

  bool expired = 8;            // 令牌已过期（超时未轮询），需重新 lobby_join
  string expire_reason = 9;    // "timeout" / "user_cancelled" / "kicked"
}

// QueueCancelRequest 取消排队
message QueueCancelRequest {
  string ticket = 1;
}

// QueueCancelResponse 取消排队响应
message QueueCancelResponse {
  bool success = 1;
}

// BatchPresenceJoinSignal 批量跨地图 presence.join 信号
message BatchPresenceJoinSignal {
  repeated PresenceJoinSignal joins = 1;
}

// BatchPresenceLeaveSignal 批量跨地图 presence.leave 信号
message BatchPresenceLeaveSignal {
  repeated PresenceLeaveSignal leaves = 1;
}

// ==================== Match Signal ====================

// MatchSignal 管理后台发送的信号
message MatchSignal {
  string action = 1;
  
  oneof payload {
    KickSignal kick = 10;
    AssetsUpdatedSignal assets_updated = 11;
    BroadcastMessageSignal broadcast_message = 12;
    TeleportArrivalSignal teleport_arrival = 13;
    ChatMessageSignal chat_message = 14;
    OnlineCountChangedSignal online_count_changed = 18;
    PresenceJoinSignal presence_join = 19;
    PresenceLeaveSignal presence_leave = 20;
    BatchPresenceJoinSignal batch_presence_join = 21;
    BatchPresenceLeaveSignal batch_presence_leave = 22;
  }
}

// PresenceJoinSignal 跨 Match 用户进入通知信号（仅通知，不含坐标，不渲染）
message PresenceJoinSignal {
  string user_id = 1;
  string nickname = 2;
  string avatar_url = 3;
  bool is_anonymous = 4;
  string map_id = 5;  // 用户进入的地图 ID
  string business_user_id = 6;  // 业务 ID
}

// PresenceLeaveSignal 跨 Match 用户离开通知信号
message PresenceLeaveSignal {
  string user_id = 1;
  string map_id = 2;         // 用户离开的地图 ID
  string target_map_id = 3;  // 传送目标地图（传送离开时有值，正常断线时为空）
}

// KickSignal 踢人信号
message KickSignal {
  string user_id = 1;
  string reason = 2;
}

// AssetsUpdatedSignal 素材更新信号
message AssetsUpdatedSignal {
  string update_type = 1;
  string message = 2;
}

// BroadcastMessageSignal 跨 Match 全服广播信号
message BroadcastMessageSignal {
  string message_id = 1;
  string user_id = 2;
  string nickname = 3;
  string avatar_url = 4;
  string content = 5;
  int64 timestamp = 6;
}

// TeleportArrivalSignal 传送到达信号（源地图 → 目标地图）
// 由源地图的 handlePortalUse 通过 MatchSignal 发送给目标地图，
// 目标地图在 MatchSignal 回调中缓存到 pendingTeleports，
// MatchJoin 时从本地内存读取，彻底消除 Storage 竞态。
message TeleportArrivalSignal {
  string user_id = 1;       // 传送用户 ID
  string source_map_id = 2; // 来源地图 ID
  double target_x = 3;      // 目标落点 X
  double target_y = 4;      // 目标落点 Y
  int64 issued_at = 5;      // 签发时间戳（毫秒），用于 TTL 过期清理
}

// ChatMessageSignal 跨 Match 聊天消息信号
message ChatMessageSignal {
  string message_id = 1;
  string user_id = 2;
  string nickname = 3;
  string content = 4;
  string message_type = 5;
  bool is_anonymous = 6;
  int64 timestamp = 7;
}

// OnlineCountChangedSignal 全服在线人数变更信号
message OnlineCountChangedSignal {
  int32 total = 1;
  map<string, int32> by_map = 2;
}
