name: bakabox_app
description: "BakaBox - CS2 Launcher"
publish_to: 'none'

version: 1.0.9+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  material_design_icons_flutter: ^7.0.7296
  
  # HTTP & Network
  http: ^1.2.0
  dio: ^5.4.0
  
  # State Management - Bloc
  flutter_bloc: ^9.1.0
  bloc: ^9.0.0
  equatable: ^2.0.7
  rxdart: ^0.28.0
  
  # Routing - GoRouter
  go_router: ^15.1.2
  
  # Local Storage & Caching
  path: ^1.9.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # UI Components
  fl_chart: ^0.68.0
  flutter_html: ^3.0.0-beta.2
  flutter_markdown: ^0.7.3
  flutter_quill: ^11.0.0
  
  # Animations
  flutter_staggered_animations: ^1.1.1
  flutter_animate: ^4.5.0
  curved_navigation_bar: ^1.0.6

  # Game Engine
  flame: ^1.18.0
  
  # Game Engine - TexturePacker support (compatible with Dart 3.9)
  flame_texturepacker: ^5.0.5
  
  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.2.4
  package_info_plus: ^8.0.0
  path_provider: ^2.1.1
  crypto: ^3.0.3
  uuid: ^4.5.1
  
  # Logging
  logger: ^2.0.0
  
  # Desktop Support
  file_picker: ^8.0.0
  desktop_multi_window: ^0.3.0
  windows_single_instance: ^1.1.0
  crop_your_image: ^2.0.0
  # Use the forked window_manager with showWithoutActivating support
  window_manager:
    git:
      url: https://github.com/CrimsonAishia/window_manager.git
      path: packages/window_manager
      ref: 2ebc4b2d776b0c2772b6146489193f199b8d69eb
  
  # Audio
  audioplayers: ^6.1.0

  # Video Player (lightweight, supports custom headers)
  video_player: ^2.9.2
  fvp: ^0.35.0

  # TTS (Offline Text-to-Speech)
  sherpa_onnx: ^1.10.0
  
  # Archive extraction (for TTS model tar.bz2)
  archive: ^4.0.2
  
  # Network Ping (替代 Process.run，内存占用更低)
  dart_ping: ^9.0.1
  
  # Clipboard (支持图片复制)
  super_clipboard: ^0.8.0
  
  # Screenshot (支持长截图)
  screenshot: ^3.0.0
  
  # Image processing (JPEG compression)
  image: ^4.3.0
  
  # WebView (for QQ login) - using local fork with getCookies support
  webview_windows:
    git:
      url: https://github.com/CrimsonAishia/flutter-webview-windows.git
      ref: ff7488a79a310fd03e514dab489e06d67d5d4d37
  
  # JSON & Serialization
  json_annotation: ^4.8.1
  source_server: ^4.0.0
  just_the_tooltip: ^0.0.12
  flex_color_picker: ^3.7.2
  tray_manager: ^0.5.2
  web: ^1.1.1
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  json_serializable: ^6.7.1
  build_runner: ^2.4.8
  glados: ^1.1.1
  msix: ^3.16.7

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/tutorials/
    - assets/images/character_gallery/
    - assets/images/queue/
    - assets/icons/
    - assets/audio/


# MSIX Configuration for Microsoft Store
msix_config:
  display_name: BakaBox
  publisher_display_name: Aishia Studio
  identity_name: AishiaStudio.BakaBox
  msix_version: 1.0.0.0
  logo_path: windows/runner/resources/app_icon.ico
  capabilities: internetClient
  
  # Publisher identity (需要从 Partner Center 获取)
  # 提交到商店前需要更新这个值
  publisher: CN=78264BDC-AE8D-43AA-B460-F031E8B1DDA5
  
  # 应用信息
  app_description: BakaBox - CS2 Launcher. Browse CS2 community servers, view server details, and join games with one click.
  
  # 语言支持
  languages: zh-CN, en-US
  
  # 架构
  architecture: x64
